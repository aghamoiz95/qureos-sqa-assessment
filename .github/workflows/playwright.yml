name: Playwright

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      QUREOS_BASE_URL: ${{ vars.QUREOS_BASE_URL || 'https://new-stg.qureos.com' }}
      QUREOS_API_BASE_URL: ${{ vars.QUREOS_API_BASE_URL || 'https://api-v3-stg.qureos.com' }}
      QUREOS_CORPORATE_EMAIL: ${{ secrets.QUREOS_CORPORATE_EMAIL }}
      QUREOS_CORPORATE_PASSWORD: ${{ secrets.QUREOS_CORPORATE_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Run tests
        run: npm run test:ci

      - name: Write run summary
        if: always()
        run: |
          {
            echo "## Qureos Playwright run"
            echo ""
            echo "- Status: ${{ job.status }}"
            echo "- Screenshots: qureos-screenshots artifact"
            echo "- HTML report: playwright-report artifact"
            echo "- Failure traces/videos: playwright-failure-artifacts artifact when the test fails"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: qureos-screenshots
          path: artifacts/screenshots
          if-no-files-found: warn
          retention-days: 14

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: warn
          retention-days: 14

      - name: Upload traces and videos
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-failure-artifacts
          path: test-results
          if-no-files-found: warn
          retention-days: 14
